services:
  - type: web
    name: gambit-engine
    env: python
    rootDir: chess-engine
    buildCommand: "apt-get update && apt-get install -y stockfish && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: STOCKFISH_POOL_SIZE
        value: "2"
      - key: STOCKFISH_PATH
        value: "/usr/bin/stockfish"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
